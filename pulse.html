<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse — Stay in Rhythm</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --surface3: #1e1e28;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.15);
    --text: #f0f0f5;
    --text-muted: #6b6b80;
    --text-dim: #3a3a50;
    --accent: #7c6aff;
    --accent-glow: rgba(124,106,255,0.25);
    --accent2: #ff6a8e;
    --accent3: #6affca;
    --high: #ff4d6d;
    --high-bg: rgba(255,77,109,0.12);
    --med: #ffa94d;
    --med-bg: rgba(255,169,77,0.12);
    --low: #51cf66;
    --low-bg: rgba(81,207,102,0.12);
    --radius: 14px;
    --radius-sm: 8px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    top: -30%;
    left: -20%;
    width: 70%;
    height: 70%;
    background: radial-gradient(ellipse, rgba(124,106,255,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -20%;
    right: -10%;
    width: 50%;
    height: 60%;
    background: radial-gradient(ellipse, rgba(255,106,142,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Layout */
  .app {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 260px 1fr;
    grid-template-rows: auto 1fr;
    min-height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    grid-row: 1 / -1;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 0;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow: hidden;
  }

  .logo {
    padding: 28px 24px 24px;
    border-bottom: 1px solid var(--border);
  }

  .logo-mark {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .logo-icon svg { width: 16px; height: 16px; fill: white; }

  .logo-text {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .logo-sub {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Stats strip */
  .stats {
    padding: 20px 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }

  .stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
  }

  .stat-value {
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .stat-card.accent .stat-value { color: var(--accent); }
  .stat-card.high .stat-value { color: var(--high); }

  /* Nav */
  .nav {
    padding: 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .nav-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 8px 8px 6px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.15s ease;
    color: var(--text-muted);
    font-size: 13.5px;
    font-weight: 500;
    border: 1px solid transparent;
    user-select: none;
  }

  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active {
    background: var(--accent-glow);
    color: var(--accent);
    border-color: rgba(124,106,255,0.2);
  }

  .nav-item .nav-icon { width: 16px; height: 16px; opacity: 0.8; flex-shrink: 0; }
  .nav-item.active .nav-icon { opacity: 1; }

  .nav-badge {
    margin-left: auto;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    background: var(--surface3);
    color: var(--text-muted);
    padding: 2px 7px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }
  .nav-item.active .nav-badge {
    background: rgba(124,106,255,0.2);
    color: var(--accent);
    border-color: rgba(124,106,255,0.3);
  }

  /* Priorities legend */
  .priority-legend {
    margin-top: auto;
    padding: 20px 24px;
    border-top: 1px solid var(--border);
  }

  .priority-legend-title {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .priority-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .priority-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .priority-dot.high { background: var(--high); box-shadow: 0 0 6px var(--high); }
  .priority-dot.med { background: var(--med); box-shadow: 0 0 6px var(--med); }
  .priority-dot.low { background: var(--low); box-shadow: 0 0 6px var(--low); }

  /* Header */
  .header {
    padding: 28px 36px 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
  }

  .header-left h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1;
  }

  .header-left .date-line {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 6px;
    letter-spacing: 0.05em;
  }

  .header-left .date-line span { color: var(--accent); }

  .add-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 11px 20px;
    background: linear-gradient(135deg, var(--accent), #9f6aff);
    border: none;
    border-radius: var(--radius-sm);
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 20px var(--accent-glow);
    flex-shrink: 0;
  }

  .add-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 28px rgba(124,106,255,0.4);
  }

  .add-btn:active { transform: translateY(0); }
  .add-btn svg { width: 14px; height: 14px; fill: white; }

  /* Filter bar */
  .filter-bar {
    padding: 20px 36px 0;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-chip {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s ease;
    letter-spacing: 0.05em;
    user-select: none;
  }

  .filter-chip:hover { border-color: var(--border-hover); color: var(--text); }

  .filter-chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .filter-chip.high.active { background: var(--high); border-color: var(--high); }
  .filter-chip.med.active { background: var(--med); border-color: var(--med); }
  .filter-chip.low.active { background: var(--low); border-color: var(--low); }

  .search-wrap {
    margin-left: auto;
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 14px;
    height: 14px;
    fill: var(--text-muted);
    pointer-events: none;
  }

  .search-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 14px 8px 34px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    width: 200px;
    transition: all 0.2s;
    outline: none;
  }

  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
    width: 240px;
  }

  .search-input::placeholder { color: var(--text-dim); }

  /* Main content */
  .main {
    padding: 24px 36px 40px;
    overflow-y: auto;
  }

  /* Task grid */
  .task-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px;
    margin-top: 0;
  }

  /* Task card */
  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
    animation: cardIn 0.35s ease both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .task-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    border-radius: 99px 99px 0 0;
    transition: opacity 0.2s;
  }

  .task-card.high::before { background: var(--high); }
  .task-card.med::before { background: var(--med); }
  .task-card.low::before { background: var(--low); }

  .task-card:hover {
    border-color: var(--border-hover);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  }

  .task-card.done {
    opacity: 0.45;
  }

  .task-card.done .task-title {
    text-decoration: line-through;
    color: var(--text-muted);
  }

  .task-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 10px;
  }

  .task-checkbox {
    width: 18px; height: 18px;
    border: 2px solid var(--border-hover);
    border-radius: 5px;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
  }

  .task-card.done .task-checkbox {
    background: var(--accent);
    border-color: var(--accent);
  }

  .task-checkbox svg { width: 10px; height: 10px; fill: white; display: none; }
  .task-card.done .task-checkbox svg { display: block; }

  .task-title {
    font-size: 14.5px;
    font-weight: 600;
    line-height: 1.35;
    flex: 1;
  }

  .task-actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .task-card:hover .task-actions { opacity: 1; }

  .task-action-btn {
    width: 26px; height: 26px;
    border: none;
    background: var(--surface2);
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    transition: all 0.15s;
    padding: 0;
  }

  .task-action-btn:hover { background: var(--surface3); color: var(--text); }
  .task-action-btn.delete:hover { background: rgba(255,77,109,0.15); color: var(--high); }

  .task-action-btn svg { width: 13px; height: 13px; fill: currentColor; }

  .task-desc {
    font-family: 'DM Mono', monospace;
    font-size: 11.5px;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 14px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .task-footer {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .priority-badge {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
  }

  .priority-badge.high { background: var(--high-bg); color: var(--high); }
  .priority-badge.med { background: var(--med-bg); color: var(--med); }
  .priority-badge.low { background: var(--low-bg); color: var(--low); }

  .due-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .due-badge svg { width: 11px; height: 11px; fill: currentColor; flex-shrink: 0; }
  .due-badge.overdue { color: var(--high); }
  .due-badge.soon { color: var(--med); }

  /* Empty state */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 40px;
    animation: cardIn 0.4s ease;
  }

  .empty-icon {
    width: 60px; height: 60px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
  }

  .empty-icon svg { width: 26px; height: 26px; fill: var(--text-dim); }

  .empty-state h3 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .empty-state p {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }

  /* Modal overlay */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border-hover);
    border-radius: 20px;
    padding: 32px;
    width: 100%;
    max-width: 500px;
    transform: translateY(16px) scale(0.98);
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  }

  .modal-overlay.open .modal {
    transform: translateY(0) scale(1);
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .modal-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .modal-close {
    width: 32px; height: 32px;
    border: none;
    background: var(--surface2);
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    transition: all 0.15s;
  }

  .modal-close:hover { background: var(--surface3); color: var(--text); }
  .modal-close svg { width: 14px; height: 14px; fill: currentColor; }

  /* Form */
  .form-group { margin-bottom: 18px; }

  .form-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 8px;
  }

  .form-input, .form-textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px 14px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 13.5px;
    outline: none;
    transition: all 0.2s;
    resize: none;
  }

  .form-input:focus, .form-textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .form-input::placeholder, .form-textarea::placeholder { color: var(--text-dim); }

  .form-textarea { height: 90px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  /* Priority select */
  .priority-select {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .priority-option {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 8px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    user-select: none;
  }

  .priority-option:hover { border-color: var(--border-hover); }

  .priority-option.selected.high {
    background: var(--high-bg);
    border-color: var(--high);
    color: var(--high);
  }

  .priority-option.selected.med {
    background: var(--med-bg);
    border-color: var(--med);
    color: var(--med);
  }

  .priority-option.selected.low {
    background: var(--low-bg);
    border-color: var(--low);
    color: var(--low);
  }

  .priority-option .p-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    margin: 0 auto 6px;
  }

  .priority-option.high .p-dot { background: var(--high); }
  .priority-option.med .p-dot { background: var(--med); }
  .priority-option.low .p-dot { background: var(--low); }

  /* Submit */
  .form-submit {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, var(--accent), #9f6aff);
    border: none;
    border-radius: var(--radius-sm);
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 6px;
    box-shadow: 0 4px 20px var(--accent-glow);
  }

  .form-submit:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 28px rgba(124,106,255,0.4);
  }

  /* Progress bar */
  .progress-strip {
    padding: 0 36px;
    margin-top: 20px;
    margin-bottom: 4px;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .progress-pct {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
  }

  .progress-track {
    height: 4px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 20px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3));
    border-radius: 99px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 99px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border-hover);
    border-radius: 12px;
    padding: 12px 18px;
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 200;
    transform: translateY(20px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* Section label */
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin: 20px 0 12px;
  }

  .section-label:first-child { margin-top: 4px; }
</style>
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-mark">
        <div class="logo-icon">
          <svg viewBox="0 0 16 16"><path d="M8 1a1 1 0 011 1v2.5l1.5-.9a1 1 0 011 1.73L10 6.5l1.5.87a1 1 0 01-1 1.73L9 8.2V11a1 1 0 01-2 0V8.2l-1.5.9a1 1 0 01-1-1.73L6 6.5 4.5 5.33a1 1 0 011-1.73L7 4.5V2a1 1 0 011-1z"/></svg>
        </div>
        <div>
          <div class="logo-text">Pulse</div>
          <div class="logo-sub">Stay in Rhythm</div>
        </div>
      </div>
    </div>

    <div class="stats">
      <div class="stat-card accent">
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-done">0</div>
        <div class="stat-label">Done</div>
      </div>
      <div class="stat-card high">
        <div class="stat-value" id="stat-high">0</div>
        <div class="stat-label">High Priority</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-overdue">0</div>
        <div class="stat-label">Overdue</div>
      </div>
    </div>

    <nav class="nav">
      <div class="nav-label">Views</div>
      <div class="nav-item active" data-view="all" onclick="setView('all', this)">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M2 3h12v2H2zm0 4h12v2H2zm0 4h8v2H2z"/></svg>
        All Tasks
        <span class="nav-badge" id="badge-all">0</span>
      </div>
      <div class="nav-item" data-view="active" onclick="setView('active', this)">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M8 5v3l2 2"/></svg>
        Active
        <span class="nav-badge" id="badge-active">0</span>
      </div>
      <div class="nav-item" data-view="done" onclick="setView('done', this)">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M2 8l4 4 8-8" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Completed
        <span class="nav-badge" id="badge-done">0</span>
      </div>
      <div class="nav-item" data-view="overdue" onclick="setView('overdue', this)">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zm1 7.5H7V4h2v4.5zm0 2.5H7v-2h2v2z"/></svg>
        Overdue
        <span class="nav-badge" id="badge-overdue">0</span>
      </div>
    </nav>

    <div class="priority-legend">
      <div class="priority-legend-title">Priority</div>
      <div class="priority-item"><div class="priority-dot high"></div>High — Urgent tasks</div>
      <div class="priority-item"><div class="priority-dot med"></div>Medium — Normal flow</div>
      <div class="priority-item"><div class="priority-dot low"></div>Low — When available</div>
    </div>
  </aside>

  <!-- Main -->
  <div style="display: flex; flex-direction: column; min-height: 100vh; overflow: hidden;">

    <div class="header">
      <div class="header-left">
        <h1 id="view-title">All Tasks</h1>
        <div class="date-line" id="date-line"></div>
      </div>
      <button class="add-btn" onclick="openModal()">
        <svg viewBox="0 0 14 14"><path d="M7 1v12M1 7h12" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
        New Task
      </button>
    </div>

    <div class="progress-strip">
      <div class="progress-header">
        <span class="progress-label">Today's Progress</span>
        <span class="progress-pct" id="progress-pct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="filter-bar">
      <div class="filter-chip active" data-filter="all" onclick="setFilter('all', this)">All</div>
      <div class="filter-chip high" data-filter="high" onclick="setFilter('high', this)">🔴 High</div>
      <div class="filter-chip med" data-filter="med" onclick="setFilter('med', this)">🟡 Medium</div>
      <div class="filter-chip low" data-filter="low" onclick="setFilter('low', this)">🟢 Low</div>
      <div class="search-wrap">
        <svg viewBox="0 0 16 16"><path d="M11.5 7a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zm-1.1 4.3l2.8 2.8" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
        <input class="search-input" type="text" placeholder="Search tasks..." id="search-input" oninput="renderTasks()">
      </div>
    </div>

    <div class="main">
      <div class="task-grid" id="task-grid"></div>
    </div>

  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title-text">New Task</div>
      <button class="modal-close" onclick="closeModal()">
        <svg viewBox="0 0 14 14"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div class="form-group">
      <label class="form-label">Task Title</label>
      <input class="form-input" type="text" id="task-title" placeholder="What needs to be done?">
    </div>

    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-textarea" id="task-desc" placeholder="Add context, notes, or details…"></textarea>
    </div>

    <div class="form-row">
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">Due Date</label>
        <input class="form-input" type="date" id="task-due">
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">Priority</label>
        <div class="priority-select" id="priority-select">
          <div class="priority-option high selected" onclick="selectPriority('high')">
            <div class="p-dot"></div>High
          </div>
          <div class="priority-option med" onclick="selectPriority('med')">
            <div class="p-dot"></div>Med
          </div>
          <div class="priority-option low" onclick="selectPriority('low')">
            <div class="p-dot"></div>Low
          </div>
        </div>
      </div>
    </div>

    <button class="form-submit" onclick="saveTask()" id="submit-btn">Add Task</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <div class="toast-dot" id="toast-dot"></div>
  <span id="toast-msg"></span>
</div>

<script>
  // State
  let tasks = JSON.parse(localStorage.getItem('pulse-tasks') || '[]');
  let currentView = 'all';
  let currentFilter = 'all';
  let selectedPriority = 'high';
  let editingId = null;

  // Seed demo tasks if empty
  if (tasks.length === 0) {
    const today = new Date();
    const fmt = d => d.toISOString().split('T')[0];
    const past = n => { const d = new Date(); d.setDate(d.getDate() - n); return fmt(d); };
    const future = n => { const d = new Date(); d.setDate(d.getDate() + n); return fmt(d); };
    tasks = [
      { id: uid(), title: 'Finalize Q3 product roadmap', desc: 'Review feature requests, prioritize backlog, align with engineering capacity.', due: future(2), priority: 'high', done: false, created: Date.now() - 5000 },
      { id: uid(), title: 'Design system audit', desc: 'Check token consistency across all components and update deprecated patterns.', due: future(5), priority: 'med', done: false, created: Date.now() - 4000 },
      { id: uid(), title: 'Update README documentation', desc: 'Add setup instructions and contribution guidelines for new team members.', due: past(1), priority: 'low', done: false, created: Date.now() - 3000 },
      { id: uid(), title: 'Team sync preparation', desc: 'Prepare agenda, gather metrics, schedule stakeholder check-ins.', due: future(1), priority: 'high', done: true, created: Date.now() - 2000 },
      { id: uid(), title: 'API rate limiting review', desc: 'Evaluate current limits and propose adjustments based on usage patterns.', due: past(2), priority: 'high', done: false, created: Date.now() - 1000 },
    ];
    save();
  }

  function uid() {
    return Math.random().toString(36).slice(2) + Date.now().toString(36);
  }

  function save() {
    localStorage.setItem('pulse-tasks', JSON.stringify(tasks));
  }

  // Date setup
  const now = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('date-line').innerHTML =
    `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()} — <span>Week ${getWeekNum()}</span>`;

  function getWeekNum() {
    const d = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
    d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
    return Math.ceil((((d - new Date(Date.UTC(d.getUTCFullYear(), 0, 1))) / 86400000) + 1) / 7);
  }

  // View
  function setView(view, el) {
    currentView = view;
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
    const titles = { all: 'All Tasks', active: 'Active Tasks', done: 'Completed', overdue: 'Overdue' };
    document.getElementById('view-title').textContent = titles[view];
    renderTasks();
  }

  // Filter
  function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    renderTasks();
  }

  // Priority
  function selectPriority(p) {
    selectedPriority = p;
    document.querySelectorAll('.priority-option').forEach(o => {
      o.classList.remove('selected');
    });
    document.querySelector(`.priority-option.${p}`).classList.add('selected');
  }

  // Modal
  function openModal(id) {
    editingId = id || null;
    const overlay = document.getElementById('modal-overlay');
    if (id) {
      const t = tasks.find(t => t.id === id);
      document.getElementById('modal-title-text').textContent = 'Edit Task';
      document.getElementById('submit-btn').textContent = 'Save Changes';
      document.getElementById('task-title').value = t.title;
      document.getElementById('task-desc').value = t.desc || '';
      document.getElementById('task-due').value = t.due || '';
      selectPriority(t.priority || 'high');
    } else {
      document.getElementById('modal-title-text').textContent = 'New Task';
      document.getElementById('submit-btn').textContent = 'Add Task';
      document.getElementById('task-title').value = '';
      document.getElementById('task-desc').value = '';
      document.getElementById('task-due').value = '';
      selectPriority('high');
    }
    overlay.classList.add('open');
    setTimeout(() => document.getElementById('task-title').focus(), 200);
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    editingId = null;
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  }

  // Save task
  function saveTask() {
    const title = document.getElementById('task-title').value.trim();
    if (!title) {
      document.getElementById('task-title').style.borderColor = 'var(--high)';
      setTimeout(() => document.getElementById('task-title').style.borderColor = '', 1200);
      return;
    }
    const task = {
      id: editingId || uid(),
      title,
      desc: document.getElementById('task-desc').value.trim(),
      due: document.getElementById('task-due').value,
      priority: selectedPriority,
      done: editingId ? tasks.find(t => t.id === editingId).done : false,
      created: editingId ? tasks.find(t => t.id === editingId).created : Date.now(),
    };
    if (editingId) {
      tasks = tasks.map(t => t.id === editingId ? task : t);
      showToast('Task updated', '#7c6aff');
    } else {
      tasks.unshift(task);
      showToast('Task added', '#51cf66');
    }
    save();
    closeModal();
    renderTasks();
  }

  // Toggle done
  function toggleDone(id) {
    tasks = tasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
    save();
    renderTasks();
    const t = tasks.find(t => t.id === id);
    showToast(t.done ? 'Marked complete ✓' : 'Marked active', t.done ? '#51cf66' : '#7c6aff');
  }

  // Delete
  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
    renderTasks();
    showToast('Task deleted', '#ff4d6d');
  }

  // Due date helpers
  function isOverdue(due) {
    if (!due) return false;
    return new Date(due) < new Date(new Date().toDateString());
  }

  function isSoon(due) {
    if (!due) return false;
    const diff = (new Date(due) - new Date()) / 86400000;
    return diff >= 0 && diff <= 2;
  }

  function formatDue(due) {
    if (!due) return '';
    const d = new Date(due + 'T00:00:00');
    const today = new Date();
    today.setHours(0,0,0,0);
    const diff = Math.round((d - today) / 86400000);
    if (diff === 0) return 'Today';
    if (diff === 1) return 'Tomorrow';
    if (diff === -1) return 'Yesterday';
    if (diff < -1) return `${Math.abs(diff)}d overdue`;
    if (diff <= 7) return `In ${diff} days`;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  // Render
  function renderTasks() {
    const query = document.getElementById('search-input').value.toLowerCase();
    const today = new Date().toISOString().split('T')[0];

    let filtered = [...tasks];

    // View filter
    if (currentView === 'active') filtered = filtered.filter(t => !t.done);
    if (currentView === 'done') filtered = filtered.filter(t => t.done);
    if (currentView === 'overdue') filtered = filtered.filter(t => !t.done && t.due && t.due < today);

    // Priority filter
    if (currentFilter !== 'all') filtered = filtered.filter(t => t.priority === currentFilter);

    // Search
    if (query) filtered = filtered.filter(t =>
      t.title.toLowerCase().includes(query) ||
      (t.desc || '').toLowerCase().includes(query)
    );

    // Stats
    const total = tasks.length;
    const done = tasks.filter(t => t.done).length;
    const high = tasks.filter(t => t.priority === 'high' && !t.done).length;
    const overdue = tasks.filter(t => !t.done && t.due && t.due < today).length;

    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-done').textContent = done;
    document.getElementById('stat-high').textContent = high;
    document.getElementById('stat-overdue').textContent = overdue;

    document.getElementById('badge-all').textContent = tasks.length;
    document.getElementById('badge-active').textContent = tasks.filter(t => !t.done).length;
    document.getElementById('badge-done').textContent = done;
    document.getElementById('badge-overdue').textContent = overdue;

    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    document.getElementById('progress-pct').textContent = pct + '%';
    document.getElementById('progress-fill').style.width = pct + '%';

    // Render cards
    const grid = document.getElementById('task-grid');

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">
            <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
          </div>
          <h3>No tasks here</h3>
          <p>${query ? 'Try a different search term' : 'Click "New Task" to get started'}</p>
        </div>`;
      return;
    }

    grid.innerHTML = filtered.map((t, i) => {
      const od = !t.done && isOverdue(t.due);
      const soon = !t.done && isSoon(t.due);
      return `
        <div class="task-card ${t.priority} ${t.done ? 'done' : ''}" style="animation-delay:${i * 40}ms">
          <div class="task-top">
            <div class="task-checkbox" onclick="toggleDone('${t.id}')">
              <svg viewBox="0 0 10 10"><path d="M2 5l2.5 2.5 4-4" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <div class="task-title">${escHtml(t.title)}</div>
            <div class="task-actions">
              <button class="task-action-btn" onclick="openModal('${t.id}')" title="Edit">
                <svg viewBox="0 0 14 14"><path d="M10 2l2 2-7 7H3V9l7-7z" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linejoin="round"/></svg>
              </button>
              <button class="task-action-btn delete" onclick="deleteTask('${t.id}')" title="Delete">
                <svg viewBox="0 0 14 14"><path d="M2 4h10M5 4V2h4v2M5 6v5M9 6v5M3 4l1 8h6l1-8" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/></svg>
              </button>
            </div>
          </div>
          ${t.desc ? `<div class="task-desc">${escHtml(t.desc)}</div>` : ''}
          <div class="task-footer">
            <span class="priority-badge ${t.priority}">${t.priority === 'med' ? 'medium' : t.priority}</span>
            ${t.due ? `
              <span class="due-badge ${od ? 'overdue' : soon ? 'soon' : ''}">
                <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M8 5v3l2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                ${formatDue(t.due)}
              </span>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // Toast
  let toastTimer;
  function showToast(msg, color) {
    clearTimeout(toastTimer);
    const t = document.getElementById('toast');
    document.getElementById('toast-msg').textContent = msg;
    document.getElementById('toast-dot').style.background = color;
    t.classList.add('show');
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  // Keyboard
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openModal(); }
    if (e.key === 'Enter' && document.getElementById('modal-overlay').classList.contains('open')) {
      const active = document.activeElement;
      if (active.tagName !== 'TEXTAREA') saveTask();
    }
  });

  // Init
  renderTasks();
</script>
</body>
</html>
