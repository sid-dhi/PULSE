
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Pro | To-Do & Notes App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        :root {
            --primary: #4a6fa5;
            --secondary: #166088;
            --accent: #20a39e;
            --light: #f8f9fa;
            --dark: #343a40;
            --danger: #e63946;
            --success: #2a9d8f;
            --warning: #e9c46a;
            --border-radius: 8px;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        body {
            background-color: #f0f2f5;
            color: var(--dark);
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
        }
        
        .logo i {
            font-size: 28px;
        }
        
        .logo h1 {
            font-size: 24px;
            font-weight: 700;
        }
        
        .stats {
            display: flex;
            gap: 20px;
        }
        
        .stat-box {
            background: white;
            padding: 10px 15px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            text-align: center;
            min-width: 100px;
        }
        
        .stat-box h3 {
            font-size: 24px;
            color: var(--primary);
        }
        
        .stat-box p {
            font-size: 12px;
            color: #666;
        }
        
        .app-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        
        @media (max-width: 768px) {
            .app-container {
                grid-template-columns: 1fr;
            }
        }
        
        .section {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 25px;
            height: fit-content;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        
        .section-header h2 {
            color: var(--primary);
            font-size: 22px;
        }
        
        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn:hover {
            background-color: var(--secondary);
            transform: translateY(-2px);
        }
        
        .btn-danger {
            background-color: var(--danger);
        }
        
        .btn-success {
            background-color: var(--success);
        }
        
        .btn-accent {
            background-color: var(--accent);
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        input, textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: var(--border-radius);
            font-size: 16px;
            transition: border 0.3s;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        .task-list {
            list-style: none;
            margin-top: 20px;
        }
        
        .task-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: var(--border-radius);
            margin-bottom: 12px;
            transition: all 0.3s;
            border-left: 4px solid var(--primary);
        }
        
        .task-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        
        .task-item.completed {
            opacity: 0.7;
            border-left-color: var(--success);
        }
        
        .task-checkbox {
            margin-right: 15px;
            transform: scale(1.3);
            cursor: pointer;
        }
        
        .task-content {
            flex-grow: 1;
        }
        
        .task-title {
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .task-due {
            font-size: 13px;
            color: #666;
        }
        
        .task-priority {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }
        
        .priority-high {
            background-color: rgba(230, 57, 70, 0.1);
            color: var(--danger);
        }
        
        .priority-medium {
            background-color: rgba(233, 196, 106, 0.1);
            color: #b68a1a;
        }
        
        .priority-low {
            background-color: rgba(42, 157, 143, 0.1);
            color: var(--success);
        }
        
        .task-actions {
            display: flex;
            gap: 10px;
        }
        
        .task-actions button {
            background: none;
            border: none;
            cursor: pointer;
            color: #666;
            transition: color 0.3s;
        }
        
        .task-actions button:hover {
            color: var(--primary);
        }
        
        .note-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .note-item {
            background: #fff9db;
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: var(--shadow);
            border-top: 5px solid var(--warning);
            transition: all 0.3s;
            position: relative;
        }
        
        .note-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
        }
        
        .note-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        
        .note-title {
            font-weight: 700;
            font-size: 18px;
            color: #5a4a00;
        }
        
        .note-date {
            font-size: 12px;
            color: #999;
        }
        
        .note-content {
            color: #666;
            margin-bottom: 15px;
            max-height: 100px;
            overflow: hidden;
        }
        
        .note-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 10px;
        }
        
        .tag {
            background-color: rgba(74, 111, 165, 0.1);
            color: var(--primary);
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #888;
        }
        
        .empty-state i {
            font-size: 48px;
            margin-bottom: 15px;
            color: #ddd;
        }
        
        .filter-options {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 8px 16px;
            background: #f1f3f5;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .filter-btn.active {
            background-color: var(--primary);
            color: white;
        }
        
        footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            color: #666;
            font-size: 14px;
        }
        
        .note-actions {
            position: absolute;
            bottom: 15px;
            right: 15px;
            display: flex;
            gap: 10px;
        }
        
        .note-actions button {
            background: none;
            border: none;
            cursor: pointer;
            color: #999;
            transition: color 0.3s;
        }
        
        .note-actions button:hover {
            color: var(--primary);
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <i class="fas fa-tasks"></i>
                <h1>Productivity Pro</h1>
            </div>
            
            <div class="stats">
                <div class="stat-box">
                    <h3 id="task-count">0</h3>
                    <p>Tasks</p>
                </div>
                <div class="stat-box">
                    <h3 id="note-count">0</h3>
                    <p>Notes</p>
                </div>
            </div>
        </header>
        
        <div class="app-container">
            <!-- To-Do List Section -->
            <section class="section">
                <div class="section-header">
                    <h2><i class="fas fa-check-circle"></i> To-Do List</h2>
                    <button class="btn" id="add-task-btn">
                        <i class="fas fa-plus"></i> Add Task
                    </button>
                </div>
                
                <!-- Task Input Form -->
                <div id="task-form" class="hidden">
                    <div class="input-group">
                        <input type="text" id="task-title" placeholder="Task title...">
                    </div>
                    <div class="input-group">
                        <textarea id="task-description" placeholder="Task description..."></textarea>
                    </div>
                    <div class="input-group">
                        <label for="task-due">Due Date:</label>
                        <input type="date" id="task-due">
                    </div>
                    <div class="input-group">
                        <label for="task-priority">Priority:</label>
                        <select id="task-priority">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                    <div class="input-group" style="display: flex; gap: 10px;">
                        <button class="btn btn-success" id="save-task-btn">
                            <i class="fas fa-save"></i> Save Task
                        </button>
                        <button class="btn btn-danger" id="cancel-task-btn">
                            <i class="fas fa-times"></i> Cancel
                        </button>
                    </div>
                </div>
                
                <!-- Task Filter -->
                <div class="filter-options">
                    <button class="filter-btn active" data-filter="all">All Tasks</button>
                    <button class="filter-btn" data-filter="pending">Pending</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
                
                <!-- Task List -->
                <ul class="task-list" id="task-list">
                    <!-- Tasks will be added here dynamically -->
                </ul>
                
                <!-- Empty State for Tasks -->
                <div id="task-empty" class="empty-state hidden">
                    <i class="fas fa-clipboard-list"></i>
                    <h3>No tasks yet</h3>
                    <p>Add a task to get started!</p>
                </div>
            </section>
            
            <!-- Notes Section -->
            <section class="section">
                <div class="section-header">
                    <h2><i class="fas fa-sticky-note"></i> Notes</h2>
                    <button class="btn btn-accent" id="add-note-btn">
                        <i class="fas fa-plus"></i> Add Note
                    </button>
                </div>
                
                <!-- Note Input Form -->
                <div id="note-form" class="hidden">
                    <div class="input-group">
                        <input type="text" id="note-title" placeholder="Note title...">
                    </div>
                    <div class="input-group">
                        <textarea id="note-content" placeholder="Note content..."></textarea>
                    </div>
                    <div class="input-group">
                        <input type="text" id="note-tags" placeholder="Add tags (separate by commas)...">
                    </div>
                    <div class="input-group" style="display: flex; gap: 10px;">
                        <button class="btn btn-success" id="save-note-btn">
                            <i class="fas fa-save"></i> Save Note
                        </button>
                        <button class="btn btn-danger" id="cancel-note-btn">
                            <i class="fas fa-times"></i> Cancel
                        </button>
                    </div>
                </div>
                
                <!-- Notes List -->
                <div class="note-list" id="note-list">
                    <!-- Notes will be added here dynamically -->
                </div>
                
                <!-- Empty State for Notes -->
                <div id="note-empty" class="empty-state">
                    <i class="fas fa-sticky-note"></i>
                    <h3>No notes yet</h3>
                    <p>Add a note to capture your thoughts!</p>
                </div>
            </section>
        </div>
        
        <footer>
            <p>Productivity Pro &copy; 2023 | To-Do List & Note-Making App</p>
            <p>All data is stored locally in your browser</p>
        </footer>
    </div>

    <script>
        // App State
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        let notes = JSON.parse(localStorage.getItem('notes')) || [];
        let currentFilter = 'all';
        
        // DOM Elements
        const taskCountElement = document.getElementById('task-count');
        const noteCountElement = document.getElementById('note-count');
        const taskListElement = document.getElementById('task-list');
        const noteListElement = document.getElementById('note-list');
        const taskEmptyElement = document.getElementById('task-empty');
        const noteEmptyElement = document.getElementById('note-empty');
        
        // Initialize the app
        document.addEventListener('DOMContentLoaded', () => {
            updateStats();
            renderTasks();
            renderNotes();
            setupEventListeners();
        });
        
        // Set up event listeners
        function setupEventListeners() {
            // Task buttons
            document.getElementById('add-task-btn').addEventListener('click', showTaskForm);
            document.getElementById('cancel-task-btn').addEventListener('click', hideTaskForm);
            document.getElementById('save-task-btn').addEventListener('click', saveTask);
            
            // Note buttons
            document.getElementById('add-note-btn').addEventListener('click', showNoteForm);
            document.getElementById('cancel-note-btn').addEventListener('click', hideNoteForm);
            document.getElementById('save-note-btn').addEventListener('click', saveNote);
            
            // Filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter = this.dataset.filter;
                    renderTasks();
                });
            });
        }
        
        // Task Functions
        function showTaskForm() {
            document.getElementById('task-form').classList.remove('hidden');
            document.getElementById('add-task-btn').classList.add('hidden');
        }
        
        function hideTaskForm() {
            document.getElementById('task-form').classList.add('hidden');
            document.getElementById('add-task-btn').classList.remove('hidden');
            clearTaskForm();
        }
        
        function clearTaskForm() {
            document.getElementById('task-title').value = '';
            document.getElementById('task-description').value = '';
            document.getElementById('task-due').value = '';
            document.getElementById('task-priority').value = 'medium';
        }
        
        function saveTask() {
            const title = document.getElementById('task-title').value.trim();
            const description = document.getElementById('task-description').value.trim();
            const dueDate = document.getElementById('task-due').value;
            const priority = document.getElementById('task-priority').value;
            
            if (!title) {
                alert('Please enter a task title');
                return;
            }
            
            const newTask = {
                id: Date.now(),
                title,
                description,
                dueDate,
                priority,
                completed: false,
                createdAt: new Date().toISOString()
            };
            
            tasks.push(newTask);
            saveToLocalStorage();
            hideTaskForm();
            renderTasks();
            updateStats();
        }
        
        function toggleTaskCompletion(id) {
            const taskIndex = tasks.findIndex(task => task.id === id);
            if (taskIndex !== -1) {
                tasks[taskIndex].completed = !tasks[taskIndex].completed;
                saveToLocalStorage();
                renderTasks();
                updateStats();
            }
        }
        
        function deleteTask(id) {
            if (confirm('Are you sure you want to delete this task?')) {
                tasks = tasks.filter(task => task.id !== id);
                saveToLocalStorage();
                renderTasks();
                updateStats();
            }
        }
        
        // Note Functions
        function showNoteForm() {
            document.getElementById('note-form').classList.remove('hidden');
            document.getElementById('add-note-btn').classList.add('hidden');
        }
        
        function hideNoteForm() {
            document.getElementById('note-form').classList.add('hidden');
            document.getElementById('add-note-btn').classList.remove('hidden');
            clearNoteForm();
        }
        
        function clearNoteForm() {
            document.getElementById('note-title').value = '';
            document.getElementById('note-content').value = '';
            document.getElementById('note-tags').value = '';
        }
        
        function saveNote() {
            const title = document.getElementById('note-title').value.trim();
            const content = document.getElementById('note-content').value.trim();
            const tagsInput = document.getElementById('note-tags').value.trim();
            
            if (!title || !content) {
                alert('Please enter both title and content for the note');
                return;
            }
            
            const tags = tagsInput ? tagsInput.split(',').map(tag => tag.trim()) : [];
            
            const newNote = {
                id: Date.now(),
                title,
                content,
                tags,
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
            
            notes.push(newNote);
            saveToLocalStorage();
            hideNoteForm();
            renderNotes();
            updateStats();
        }
        
        function deleteNote(id) {
            if (confirm('Are you sure you want to delete this note?')) {
                notes = notes.filter(note => note.id !== id);
                saveToLocalStorage();
                renderNotes();
                updateStats();
            }
        }
        
        // Rendering Functions
        function renderTasks() {
            let filteredTasks = tasks;
            
            if (currentFilter === 'pending') {
                filteredTasks = tasks.filter(task => !task.completed);
            } else if (currentFilter === 'completed') {
                filteredTasks = tasks.filter(task => task.completed);
            }
            
            if (filteredTasks.length === 0) {
                taskListElement.innerHTML = '';
                taskEmptyElement.classList.remove('hidden');
                return;
            }
            
            taskEmptyElement.classList.add('hidden');
            taskListElement.innerHTML = '';
            
            filteredTasks.forEach(task => {
                const taskElement = document.createElement('li');
                taskElement.className = `task-item ${task.completed ? 'completed' : ''}`;
                taskElement.innerHTML = `
                    <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''}>
                    <div class="task-content">
                        <div class="task-title">${task.title}</div>
                        <div class="task-due">
                            ${task.description ? `<div>${task.description}</div>` : ''}
                            ${task.dueDate ? `Due: ${formatDate(task.dueDate)}` : ''}
                            <span class="task-priority priority-${task.priority}">${task.priority.charAt(0).toUpperCase() + task.priority.slice(1)}</span>
                        </div>
                    </div>
                    <div class="task-actions">
                        <button onclick="toggleTaskCompletion(${task.id})" title="${task.completed ? 'Mark as pending' : 'Mark as complete'}">
                            <i class="fas fa-${task.completed ? 'undo' : 'check'}"></i>
                        </button>
                        <button onclick="deleteTask(${task.id})" title="Delete task">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `;
                
                // Add event listener for checkbox
                const checkbox = taskElement.querySelector('.task-checkbox');
                checkbox.addEventListener('change', () => toggleTaskCompletion(task.id));
                
                taskListElement.appendChild(taskElement);
            });
        }
        
        function renderNotes() {
            if (notes.length === 0) {
                noteListElement.innerHTML = '';
                noteEmptyElement.classList.remove('hidden');
                return;
            }
            
            noteEmptyElement.classList.add('hidden');
            noteListElement.innerHTML = '';
            
            notes.slice().reverse().forEach(note => {
                const noteElement = document.createElement('div');
                noteElement.className = 'note-item';
                noteElement.innerHTML = `
                    <div class="note-header">
                        <div class="note-title">${note.title}</div>
                        <div class="note-date">${formatDate(note.createdAt, true)}</div>
                    </div>
                    <div class="note-content">${note.content.length > 150 ? note.content.substring(0, 150) + '...' : note.content}</div>
                    ${note.tags.length > 0 ? `
                    <div class="note-tags">
                        ${note.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                    </div>
                    ` : ''}
                    <div class="note-actions">
                        <button onclick="deleteNote(${note.id})" title="Delete note">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `;
                
                noteListElement.appendChild(noteElement);
            });
        }
        
        // Utility Functions
        function formatDate(dateString, includeTime = false) {
            const date = new Date(dateString);
            if (includeTime) {
                return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            }
            return date.toLocaleDateString();
        }
        
        function updateStats() {
            const totalTasks = tasks.length;
            const completedTasks = tasks.filter(task => task.completed).length;
            const pendingTasks = totalTasks - completedTasks;
            
            taskCountElement.textContent = `${pendingTasks}/${totalTasks}`;
            noteCountElement.textContent = notes.length;
        }
        
        function saveToLocalStorage() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
            localStorage.setItem('notes', JSON.stringify(notes));
        }
        
        // Add some sample data if empty
        if (tasks.length === 0 && notes.length === 0) {
            tasks = [
                {
                    id: 1,
                    title: 'Complete project proposal',
                    description: 'Finish the draft and send for review',
                    dueDate: new Date(Date.now() + 86400000).toISOString().split('T')[0],
                    priority: 'high',
                    completed: false,
                    createdAt: new Date(Date.now() - 86400000).toISOString()
                },
                {
                    id: 2,
                    title: 'Buy groceries',
                    description: 'Milk, eggs, bread, fruits',
                    dueDate: new Date(Date.now() + 172800000).toISOString().split('T')[0],
                    priority: 'medium',
                    completed: true,
                    createdAt: new Date(Date.now() - 172800000).toISOString()
                },
                {
                    id: 3,
                    title: 'Schedule dentist appointment',
                    description: 'Call Dr. Smith\'s office',
                    dueDate: '',
                    priority: 'low',
                    completed: false,
                    createdAt: new Date(Date.now() - 259200000).toISOString()
                }
            ];
            
            notes = [
                {
                    id: 1,
                    title: 'Meeting Notes',
                    content: 'Discussed the new project timeline. Team agreed to prioritize user interface improvements before backend optimization.',
                    tags: ['work', 'meeting', 'project'],
                    createdAt: new Date(Date.now() - 86400000).toISOString(),
                    updatedAt: new Date(Date.now() - 86400000).toISOString()
                },
                {
                    id: 2,
                    title: 'Book Recommendations',
                    content: '1. Atomic Habits by James Clear\n2. Deep Work by Cal Newport\n3. The Psychology of Money by Morgan Housel',
                    tags: ['books', 'reading', 'self-improvement'],
                    createdAt: new Date(Date.now() - 172800000).toISOString(),
                    updatedAt: new Date(Date.now() - 172800000).toISOString()
                }
            ];
            
            saveToLocalStorage();
            updateStats();
            renderTasks();
            renderNotes();
        }
    </script>
</body>
</html>
